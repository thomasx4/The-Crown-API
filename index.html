<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Crown - OMDb API</title>
    <link rel="stylesheet" href="style.css">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#251e8f">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>
    <div class="container">
        <header>
            <h1>The Crown OMDb API</h1>
        </header>

        <div class="search-section">
            <input type="text" id="searchInput" class="search-input" placeholder="Buscar The Crown" value="The Crown">
            <button id="searchBtn" class="search-btn">Buscar</button>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Cargando información...</p>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <div id="seriesInfo" class="series-info">
            <div class="series-header">
                <img id="seriesPoster" class="series-poster" src="" alt="Poster">
                <div class="series-details">
                    <h2 id="seriesTitle" class="series-title"></h2>
                    <div class="series-meta">
                        <span id="seriesYear" class="meta-tag"></span>
                        <span id="seriesRated" class="meta-tag"></span>
                        <span id="seriesRuntime" class="meta-tag"></span>
                        <span id="seriesImdbRating" class="meta-tag imdb"></span>
                    </div>
                    <p id="seriesPlot" class="series-plot"></p>
                    <div class="series-extra">
                        <div class="extra-item">
                            <strong>Género</strong>
                            <span id="seriesGenre"></span>
                        </div>
                        <div class="extra-item">
                            <strong>Actores</strong>
                            <span id="seriesActors"></span>
                        </div>
                        <div class="extra-item">
                            <strong>Director</strong>
                            <span id="seriesDirector"></span>
                        </div>
                        <div class="extra-item">
                            <strong>País</strong>
                            <span id="seriesCountry"></span>
                        </div>
                        <div class="extra-item">
                            <strong>Idioma</strong>
                            <span id="seriesLanguage"></span>
                        </div>
                        <div class="extra-item">
                            <strong>Premios</strong>
                            <span id="seriesAwards"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="seasons-section">
                <h3 class="seasons-title">Temporadas</h3>
                <div id="seasonsTabs" class="seasons-tabs"></div>
                <div id="episodesContainer"></div>
            </div>
        </div>

        <div id="noResults" class="no-results" style="display: none;">
            No se encontraron resultados. Intenta con otro título.
        </div>
    </div>

    <script src="script.js"></script>

    <!-- FOOTER -->
    <footer>
        <div class="container">
            <p>© 2026 Thomas David Castañeda Muñoz - Todos los derechos reservados</p>
            <p>Ficha: 3194274</p>
        </div>
    </footer>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const swPath = location.hostname === 'localhost' || location.hostname === '127.0.0.1' 
                ? 'sw.js' 
                : '/The-Crown-API/sw.js';
            
            navigator.serviceWorker.register(swPath, { scope: '/The-Crown-API/' })
                .then(registration => {
                    console.log('Service Worker registrado');
                })
                .catch(error => {
                    console.log('Error al registrar SW:', error);
                });
        });
    }
</script>
</body>
</html>
